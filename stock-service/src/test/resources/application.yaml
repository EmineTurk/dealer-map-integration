spring:
  data:
    redis:
      repositories:
        enabled: false

  datasource:
    url: jdbc:h2:mem:stockdb;MODE=Oracle;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  cache:
    type: none

clients:
  store-service:
    base-url: http://localhost:8081
    connect-timeout: 2s
    read-timeout: 3s

app:
  cors:
    allowed-origin: http://localhost:5173
